name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    # Run CI for PRs into main and for stacked PRs into the prod/* and feature/*
    # integration branches (the strangler migration lands on prod/* before main).
    branches: [main, 'prod/**', 'feature/**']

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ─── Type-check + Build ────────────────────────────────────────────────────
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          # Provide placeholder values so Vite doesn't error on missing envs.
          # Real secrets are never committed; this is just for the build step.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─── E2E Tests (auth-gated tests skipped without credentials) ─────────────
  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright's own webServer (playwright.config.ts) starts `npm run dev`
      # and waits for :5173. We must NOT also start the dev server here — doing
      # both makes the second binder fail with "port already in use", which is
      # what kept the e2e job red. Vite reads the VITE_* vars from the job env.
      - name: Run E2E tests
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
          # Auth credentials for game-import tests (optional — tests auto-skip if absent)
          PLAYWRIGHT_TEST_USER: ${{ secrets.PLAYWRIGHT_TEST_USER }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Accessibility (axe) ───────────────────────────────────────────────────
  # Explicit a11y gate (Phase 3.5): real-browser axe over the app shell —
  # structural ARIA/roles/labels, color-contrast, keyboard focus trap, skip
  # link. Component-level axe smoke tests run inside the unit-tests job (jsdom).
  # This job fails the build on any accessibility regression.
  accessibility:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility e2e (axe + contrast + keyboard)
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
        run: npx playwright test e2e/shell-a11y.spec.ts e2e/dashboard-a11y.spec.ts e2e/analysis-a11y.spec.ts e2e/improve-a11y.spec.ts e2e/accessibility.spec.ts --project=chromium

      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 7
